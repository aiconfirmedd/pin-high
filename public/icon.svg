<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <!-- Metallic steel background gradient -->
    <linearGradient id="bgMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2C2C2E"/>
      <stop offset="50%" stop-color="#1A1A1C"/>
      <stop offset="100%" stop-color="#111113"/>
    </linearGradient>
    <!-- Putting green radial -->
    <radialGradient id="greenGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3DAA45"/>
      <stop offset="100%" stop-color="#1E6B24"/>
    </radialGradient>
    <!-- Sand bunker -->
    <radialGradient id="sandGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8DDB5"/>
      <stop offset="100%" stop-color="#C9B98A"/>
    </radialGradient>
    <!-- Copper flag gradient -->
    <linearGradient id="copperFlag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D48B3A"/>
      <stop offset="40%" stop-color="#C4722A"/>
      <stop offset="100%" stop-color="#8B4513"/>
    </linearGradient>
    <!-- Chrome text gradient -->
    <linearGradient id="chromeTxt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F0F0"/>
      <stop offset="30%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#A0A0A0"/>
      <stop offset="100%" stop-color="#D0D0D0"/>
    </linearGradient>
    <!-- Gold pole -->
    <linearGradient id="poleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="40%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#A07820"/>
    </linearGradient>
    <!-- Tee texture overlay -->
    <pattern id="teePattern" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <line x1="7" y1="0" x2="7" y2="9" stroke="#3A3A3C" stroke-width="1.2" stroke-linecap="round"/>
      <ellipse cx="7" cy="9.5" rx="2.5" ry="1" fill="#3A3A3C"/>
    </pattern>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="192" height="192" rx="38" fill="url(#bgMetal)"/>

  <!-- Tee texture overlay on upper 2/3 -->
  <rect width="192" height="130" rx="0" fill="url(#teePattern)" opacity="0.55"/>

  <!-- Subtle metallic sheen at top -->
  <rect width="192" height="60" rx="0" fill="#3C3C3E" opacity="0.15"/>

  <!-- ===== PUTTING GREEN ===== -->
  <!-- Shadow beneath green -->
  <ellipse cx="96" cy="168" rx="68" ry="10" fill="#000" opacity="0.5"/>
  <!-- Sand bunker (behind green, right side) -->
  <ellipse cx="138" cy="155" rx="36" ry="18" fill="url(#sandGrad)"/>
  <!-- Sand detail lines -->
  <path d="M110 158 Q128 150 160 155" stroke="#B8A070" stroke-width="0.8" fill="none" opacity="0.6"/>
  <path d="M112 163 Q132 156 162 162" stroke="#B8A070" stroke-width="0.8" fill="none" opacity="0.6"/>
  <!-- Main putting green -->
  <ellipse cx="88" cy="158" rx="60" ry="24" fill="url(#greenGrad)"/>
  <!-- Green highlight -->
  <ellipse cx="80" cy="148" rx="32" ry="10" fill="#4DC455" opacity="0.25"/>
  <!-- Hole cup -->
  <ellipse cx="96" cy="157" rx="5" ry="2.5" fill="#111"/>
  <ellipse cx="96" cy="156.5" rx="4" ry="2" fill="#0A0A0A"/>

  <!-- ===== FLAG POLE ===== -->
  <rect x="93.5" y="82" width="5" height="75" rx="2" fill="url(#poleGrad)" filter="url(#shadow)"/>
  <!-- Pole highlight -->
  <rect x="94.5" y="82" width="1.5" height="75" rx="1" fill="#E8C060" opacity="0.5"/>

  <!-- ===== COPPER FLAG ===== -->
  <path d="M98 84 L138 98 L98 112 Z" fill="url(#copperFlag)" filter="url(#shadow)"/>
  <!-- Flag highlight sheen -->
  <path d="M98 84 L130 95 L98 96 Z" fill="#E8A040" opacity="0.3"/>
  <!-- "3" on flag -->
  <text x="120" y="103" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#F5F5F5" text-anchor="middle" opacity="0.9" filter="url(#shadow)">3</text>

  <!-- ===== PIN HIGH LOGO TEXT ===== -->
  <!-- Text shadow/outline -->
  <text x="96" y="72" font-family="-apple-system, Arial Black, sans-serif" font-size="22" font-weight="900" fill="#000" text-anchor="middle" letter-spacing="3" opacity="0.7" dy="1">PIN HIGH</text>
  <!-- Main chrome text -->
  <text x="96" y="72" font-family="-apple-system, Arial Black, sans-serif" font-size="22" font-weight="900" fill="url(#chromeTxt)" text-anchor="middle" letter-spacing="3">PIN HIGH</text>

  <!-- Sparkle dots (4 corners + center accents) -->
  <g fill="#FFFFFF" opacity="0.9">
    <polygon points="18,18 20,15 22,18 20,21" transform="scale(0.8) translate(3,3)"/>
    <polygon points="170,20 172,16 174,20 172,24" transform="scale(0.7)"/>
    <polygon points="12,170 14,166 16,170 14,174" transform="scale(0.7)"/>
    <polygon points="176,174 178,170 180,174 178,178" transform="scale(0.65)"/>
  </g>
  <!-- Small sparkle near text -->
  <circle cx="36" cy="62" r="1.5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="158" cy="58" r="1" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="22" cy="80" r="1" fill="#C4A040" opacity="0.9"/>

  <!-- Outer border shine -->
  <rect width="192" height="192" rx="38" fill="none" stroke="#4A4A4C" stroke-width="1.5" opacity="0.6"/>
</svg>
